<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkinScreen — Offline</title>
    <meta name="theme-color" content="#7BAF7A" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: #F5F1EB;
        color: #2D3B2D;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .container {
        text-align: center;
        max-width: 320px;
        width: 100%;
      }

      .logo {
        width: 80px;
        height: 80px;
        background: #7BAF7A;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 48px;
        font-weight: bold;
        color: white;
        font-family: Georgia, serif;
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        color: #2D3B2D;
        margin-bottom: 12px;
        letter-spacing: -0.3px;
      }

      p {
        font-size: 16px;
        color: #5A7059;
        line-height: 1.6;
        margin-bottom: 32px;
      }

      button {
        background: #7BAF7A;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 14px 28px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
      }

      button:active {
        background: #5A9058;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">S</div>
      <h1>You're offline</h1>
      <p>Reconnect to the internet to use SkinScreen and check your UV risk.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
