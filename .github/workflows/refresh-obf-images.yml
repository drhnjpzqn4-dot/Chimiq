name: Refresh OBF product photos

# Re-resolves Open Beauty Facts (OBF) front-image URLs hard-coded in
# IngredientScanner.tsx so stale revs are caught before users see broken
# thumbnails in the scanner gallery.
#
# Cadence:
#   - Weekly on Mondays at 06:00 UTC (cron)
#   - On demand via the Actions tab (workflow_dispatch)
#
# Outcomes per run:
#   - If the script rewrote any URLs, opens (or updates) a PR with the
#     diff so the deployed gallery actually picks them up after merge.
#   - If the script exited non-zero (any URL it could not resolve or
#     verify), the job fails. GitHub then emails repo watchers via the
#     standard "Actions workflow failed" notification, surfacing the
#     issue to the team instead of failing silently.
#
# To change the cadence, edit the cron expression below.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write       # commit the rewritten IngredientScanner.tsx
  pull-requests: write  # open the PR with the changes

jobs:
  refresh:
    name: Refresh OBF image URLs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Run refresh:obf-images
        id: refresh
        run: pnpm --filter @workspace/scripts run refresh:obf-images

      - name: Open PR with refreshed image URLs
        # Only runs when the previous step succeeded AND the script
        # actually rewrote IngredientScanner.tsx. If the script failed
        # (non-zero exit), this step is skipped and the job is marked
        # failed — which triggers GitHub's default failure email.
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/refresh-obf-images
          base: main
          commit-message: "chore: refresh Open Beauty Facts product image URLs"
          title: "chore: refresh Open Beauty Facts product image URLs"
          body: |
            Automated weekly refresh of OBF front-image URLs in
            `artifacts/skinscreen/src/components/IngredientScanner.tsx`.

            Triggered by `.github/workflows/refresh-obf-images.yml`. Merge
            once the diff looks reasonable so the deployed scanner gallery
            picks up the new revs.
          add-paths: artifacts/skinscreen/src/components/IngredientScanner.tsx
          delete-branch: true
