openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: waitlist
    description: Waitlist operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join the waitlist
      description: Adds an email to the SkinScreen waitlist. Deduplicates automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistRequest"
      responses:
        "200":
          description: Successfully joined (or already on) the waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistResponse"
        "400":
          description: Invalid email address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    WaitlistRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address to add to the waitlist
      required:
        - email
    WaitlistResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        alreadyRegistered:
          type: boolean
      required:
        - success
        - message
        - alreadyRegistered
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
