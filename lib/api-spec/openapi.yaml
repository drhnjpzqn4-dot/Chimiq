openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: waitlist
    description: Waitlist operations
  - name: analyzer
    description: Ingredient conflict analysis
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join the waitlist
      description: Adds an email to the SkinScreen waitlist. Deduplicates automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistRequest"
      responses:
        "200":
          description: Successfully joined (or already on) the waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistResponse"
        "400":
          description: Invalid email address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /analyze:
    post:
      operationId: analyzeIngredients
      tags: [analyzer]
      summary: Analyze two products for ingredient conflicts
      description: Takes two ingredient lists and returns clinically-documented conflict pairs with severity ratings and citations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Conflict analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Analysis failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    WaitlistRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address to add to the waitlist
      required:
        - email
    WaitlistResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        alreadyRegistered:
          type: boolean
      required:
        - success
        - message
        - alreadyRegistered
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AnalyzeRequest:
      type: object
      properties:
        product1:
          type: string
          maxLength: 3000
          description: Ingredient list for the first product
        product2:
          type: string
          maxLength: 3000
          description: Ingredient list for the second product
      required:
        - product1
        - product2
    ConflictResult:
      type: object
      properties:
        pair:
          type: string
          description: The two conflicting ingredients (e.g. "Retinol + Glycolic Acid")
        severity:
          type: string
          enum: [HIGH_RISK, CAUTION, SAFE]
        explanation:
          type: string
          description: Plain-English explanation of the conflict
        citation:
          type: string
          description: Research citation reference
        citationUrl:
          type: string
          description: URL to the research paper (DOI or PubMed)
      required:
        - pair
        - severity
        - explanation
        - citation
        - citationUrl
    AnalyzeResponse:
      type: object
      properties:
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/ConflictResult"
        overallSafe:
          type: boolean
          description: True if no conflicts were found
      required:
        - conflicts
        - overallSafe
