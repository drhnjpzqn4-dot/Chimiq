kind = "web"
previewPath = "/"
title = "SkinScreen"
version = "1.0.0"
id = "artifacts/skinscreen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19090

[services.development]
run = "pnpm --filter @workspace/skinscreen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skinscreen", "run", "build" ]
publicDir = "artifacts/skinscreen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19090"
BASE_PATH = "/"
