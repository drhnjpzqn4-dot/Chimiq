openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analyzer
    description: Ingredient conflict analysis
  - name: scanner
    description: Product label scanning
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: shelf
    description: User shelf (personal routine storage) endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze:
    post:
      operationId: analyzeIngredients
      tags: [analyzer]
      summary: Analyze two products for ingredient conflicts
      description: Takes two ingredient lists and returns clinically-documented conflict pairs with severity ratings and citations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Conflict analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Analysis failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /analyze-single:
    post:
      operationId: analyzeSingle
      tags: [analyzer]
      summary: Analyze a single product for ingredient concerns
      description: Takes one ingredient list and flags individual concerning ingredients with severity, category, and citations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeSingleRequest"
      responses:
        "200":
          description: Single-product analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeSingleResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Analysis failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /product-lookup:
    get:
      operationId: productLookup
      tags: [scanner]
      summary: Look up a product by name to get its ingredients
      description: Searches for a product by name and returns its ingredient list if found.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Product name search query
      responses:
        "200":
          description: Product lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductLookupResponse"
        "500":
          description: Lookup failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /suggest-alternatives:
    post:
      operationId: suggestAlternatives
      tags: [scanner]
      summary: Suggest safer product alternatives
      description: Given a flagged ingredient list, suggests 2-3 real, widely-available products that serve the same function without the problematic ingredients.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestAlternativesRequest"
      responses:
        "200":
          description: Safer product alternatives
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestAlternativesResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Suggestion generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Get the currently authenticated user's profile (returns 401 if not authenticated)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /shelf:
    get:
      tags: [shelf]
      operationId: getShelf
      summary: Get the current user's shelf
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: The user's shelf products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShelfResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [shelf]
      operationId: addToShelf
      summary: Add a product to the user's shelf
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToShelfRequest'
      responses:
        '200':
          description: Product added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShelfProduct'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /shelf/analyze-routine:
    post:
      tags: [shelf]
      operationId: analyzeRoutine
      summary: Analyse the user's full shelf for cross-product conflicts
      description: Generates all product pairs from the user's shelf and runs conflict analysis on each pair in parallel. Returns deduplicated conflicts sorted by severity.
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Routine conflict analysis complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineConflictResponse'
        '400':
          description: Not enough products on shelf to analyse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Analysis failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /shelf/{id}:
    delete:
      tags: [shelf]
      operationId: removeFromShelf
      summary: Remove a product from the user's shelf
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoveFromShelfResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found on shelf
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /scan-label:
    post:
      operationId: scanLabel
      tags: [scanner]
      summary: Scan a product label image to extract ingredients
      description: Accepts a base64-encoded product label image and returns the extracted ingredient list as plain text using Claude vision.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanLabelRequest"
      responses:
        "200":
          description: Extracted ingredients from the label
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanLabelResponse"
        "400":
          description: Invalid input (missing or invalid image)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: No ingredient list found on the label
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Scan failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    SkinProfile:
      type: string
      enum: [sensitive, young, mature, pregnant]
    AnalyzeRequest:
      type: object
      properties:
        product1:
          type: string
          maxLength: 3000
          description: Ingredient list for the first product
        product2:
          type: string
          maxLength: 3000
          description: Ingredient list for the second product
        skinProfile:
          $ref: "#/components/schemas/SkinProfile"
          description: Optional skin profile to personalise analysis
      required:
        - product1
        - product2
    AnalyzeSingleRequest:
      type: object
      properties:
        ingredients:
          type: string
          maxLength: 3000
          description: Ingredient list for the product to analyze
        skinProfile:
          $ref: "#/components/schemas/SkinProfile"
          description: Optional skin profile to personalise analysis
      required:
        - ingredients
    IngredientFlagCategory:
      type: string
      enum:
        - ENDOCRINE_DISRUPTOR
        - FORMALDEHYDE_RELEASER
        - FRAGRANCE
        - HARSH_PRESERVATIVE
        - PHOTOSENSITISER
        - KNOWN_ALLERGEN
        - NANOPARTICLE
        - CAUTION
    IngredientFlagSeverity:
      type: string
      enum: [HIGH_RISK, CAUTION]
    IngredientFlag:
      type: object
      properties:
        ingredient:
          type: string
          description: The flagged ingredient name
        category:
          $ref: "#/components/schemas/IngredientFlagCategory"
          description: Risk category
        severity:
          $ref: "#/components/schemas/IngredientFlagSeverity"
        explanation:
          type: string
          description: Plain-English explanation
        citation:
          type: string
          description: Research citation reference
        citationUrl:
          type: string
          description: URL to the research paper
      required:
        - ingredient
        - category
        - severity
        - explanation
        - citation
        - citationUrl
    AnalyzeSingleResponse:
      type: object
      properties:
        flags:
          type: array
          items:
            $ref: "#/components/schemas/IngredientFlag"
        overallSafe:
          type: boolean
          description: True if no significant concerns were found
        verdictTitle:
          type: string
          description: Short verdict string e.g. "3 concerns found"
        verdictSummary:
          type: string
          description: 1-2 sentence summary
      required:
        - flags
        - overallSafe
        - verdictTitle
        - verdictSummary
    ProductLookupResponse:
      type: object
      properties:
        found:
          type: boolean
        productName:
          type: string
        brand:
          type: string
        ingredients:
          type: string
          description: Ingredient list as plain text
      required:
        - found
    ConflictResult:
      type: object
      properties:
        pair:
          type: string
          description: The two conflicting ingredients (e.g. "Retinol + Glycolic Acid")
        severity:
          type: string
          enum: [HIGH_RISK, CAUTION, SAFE]
        explanation:
          type: string
          description: Plain-English explanation of the conflict
        citation:
          type: string
          description: Research citation reference
        citationUrl:
          type: string
          description: URL to the research paper (DOI or PubMed)
      required:
        - pair
        - severity
        - explanation
        - citation
        - citationUrl
    AnalyzeResponse:
      type: object
      properties:
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/ConflictResult"
        overallSafe:
          type: boolean
          description: True if no conflicts were found
      required:
        - conflicts
        - overallSafe
    ScanLabelRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data (JPEG or PNG)
        mimeType:
          type: string
          enum: [image/jpeg, image/png, image/webp, image/gif]
          description: MIME type of the image
      required:
        - imageBase64
        - mimeType
    ScanLabelResponse:
      type: object
      properties:
        ingredients:
          type: string
          description: Extracted ingredient list as plain text
      required:
        - ingredients
    SuggestAlternativesRequest:
      type: object
      properties:
        ingredients:
          type: string
          maxLength: 3000
          description: Full ingredient list of the scanned product
        flaggedIngredients:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 20
          description: Ingredient names that were flagged as concerns
        productType:
          type: string
          maxLength: 100
          description: Optional hint about the product type (e.g. moisturiser, cleanser)
      required:
        - ingredients
        - flaggedIngredients
    AlternativeSuggestion:
      type: object
      properties:
        name:
          type: string
          description: Product name
        brand:
          type: string
          description: Brand name
        whySafer:
          type: string
          description: One sentence explaining why this product is safer
        keyImprovement:
          type: string
          description: Short phrase describing the key ingredient improvement
      required:
        - name
        - brand
        - whySafer
        - keyImprovement
    SuggestAlternativesResponse:
      type: object
      properties:
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/AlternativeSuggestion"
        inferredProductType:
          type: string
          description: The product type inferred from the ingredient list
      required:
        - alternatives
        - inferredProductType
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    RoutineSlot:
      type: string
      enum: [morning, evening, both]
    ShelfProduct:
      type: object
      required: [id, productName, ingredients, routineSlot, addedAt]
      properties:
        id:
          type: integer
        productName:
          type: string
        ingredients:
          type: string
        routineSlot:
          $ref: '#/components/schemas/RoutineSlot'
        addedAt:
          type: string
          format: date-time
    ShelfResponse:
      type: object
      required: [products]
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/ShelfProduct'
    AddToShelfRequest:
      type: object
      required: [productName, ingredients]
      properties:
        productName:
          type: string
          maxLength: 200
        ingredients:
          type: string
          maxLength: 5000
        routineSlot:
          $ref: '#/components/schemas/RoutineSlot'
    RoutineConflict:
      type: object
      required: [product1Name, product2Name, pair, severity, explanation, citation, citationUrl]
      properties:
        product1Name:
          type: string
          description: Name of the first conflicting product on the shelf
        product2Name:
          type: string
          description: Name of the second conflicting product on the shelf
        pair:
          type: string
          description: The two conflicting ingredients (e.g. "Retinol + Glycolic Acid")
        severity:
          type: string
          enum: [HIGH_RISK, CAUTION, SAFE]
        explanation:
          type: string
        citation:
          type: string
        citationUrl:
          type: string
    RoutineConflictResponse:
      type: object
      required: [conflicts, overallSafe, highRiskCount, cautionCount]
      properties:
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/RoutineConflict'
        overallSafe:
          type: boolean
        highRiskCount:
          type: integer
          description: Number of HIGH_RISK conflicts found
        cautionCount:
          type: integer
          description: Number of CAUTION conflicts found
    RemoveFromShelfResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
