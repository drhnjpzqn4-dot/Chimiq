name: Android release build

# Builds a Play-Store-ready signed Android App Bundle (.aab) for the
# Capacitor wrapper in mobile/capacitor on every release tag matching
# `v*` (e.g. v1.0.0, v1.0.0-rc1). The .aab is uploaded as a build
# artifact and, when the workflow was triggered by a tag, attached to a
# GitHub Release.
#
# Manual runs (workflow_dispatch) also build a signed .aab when the
# signing secrets are present, otherwise they fall back to an UNSIGNED
# debug-keystore build so the pipeline can be verified without
# credentials.
#
# Required repo secrets for a signed build (set in
# Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   - `base64 -i skinscreen-upload.jks`
#   ANDROID_KEYSTORE_PASSWORD - keystore password
#   ANDROID_KEY_ALIAS         - key alias (default: skinscreen-upload)
#   ANDROID_KEY_PASSWORD      - key password
#
# Optional:
#   CAP_SERVER_URL            - overrides the bundled server URL (e.g.
#                               https://staging.skinscreen.chimiq.com).
#                               Defaults to the production URL baked
#                               into capacitor.config.ts.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      cap_server_url:
        description: "Override CAP_SERVER_URL (leave blank for prod)"
        required: false
        default: ""

permissions:
  contents: write  # needed to attach the .aab to a GitHub Release

jobs:
  build-aab:
    name: Build signed .aab
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Read version from package.json's `packageManager` field.
          run_install: false

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            artifacts/*/node_modules
            lib/*/node_modules
            scripts/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install workspace deps (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Build the web bundle
        env:
          NODE_ENV: production
        run: pnpm build:mobile

      - name: Capacitor — install + add android
        working-directory: mobile/capacitor
        run: |
          npm install --no-audit --no-fund
          # `cap add android` is idempotent enough — skip if android/
          # already exists from a cached run.
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Capacitor — sync web bundle
        working-directory: mobile/capacitor
        env:
          CAP_SERVER_URL: ${{ github.event.inputs.cap_server_url }}
        run: npm run sync

      - name: Decode signing keystore
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_B64}" ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set — building UNSIGNED bundle. Do NOT upload this .aab to Play Store."
            exit 0
          fi
          mkdir -p mobile/capacitor/android/keystores
          echo "$KEYSTORE_B64" | base64 -d > mobile/capacitor/android/keystores/skinscreen-upload.jks
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Write gradle.properties (signed)
        if: steps.keystore.outputs.signed == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          cat > mobile/capacitor/android/gradle.properties <<EOF
          SKINSCREEN_KEYSTORE_PATH=keystores/skinscreen-upload.jks
          SKINSCREEN_KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
          SKINSCREEN_KEY_ALIAS=${KEY_ALIAS:-skinscreen-upload}
          SKINSCREEN_KEY_PASSWORD=${KEY_PASSWORD}
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Wire signing config into build.gradle (signed)
        if: steps.keystore.outputs.signed == 'true'
        working-directory: mobile/capacitor
        run: bash scripts/configure-android-signing.sh

      - name: Build .aab
        working-directory: mobile/capacitor/android
        run: ./gradlew --no-daemon bundleRelease

      - name: Locate .aab
        id: locate
        run: |
          set -euo pipefail
          AAB=$(find mobile/capacitor/android/app/build/outputs/bundle -name "*.aab" | head -n1)
          if [ -z "$AAB" ]; then
            echo "::error::No .aab found after gradle build."
            exit 1
          fi
          echo "aab=$AAB" >> "$GITHUB_OUTPUT"
          echo "Built: $AAB"
          ls -lh "$AAB"

      - name: Upload .aab as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.ref_name }}.aab
          path: ${{ steps.locate.outputs.aab }}
          retention-days: 30
          if-no-files-found: error

      - name: Attach .aab to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v') && steps.keystore.outputs.signed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.aab }}
          fail_on_unmatched_files: true
          generate_release_notes: true
